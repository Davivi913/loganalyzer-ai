<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogAnalyzer AI</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
<h1>LogAnalyzer AI</h1>
<span>Blue Team - Ciberseguridad Avanzada 2026</span>
</header>
<div class="container">
<div class="upload-zone" id="dropZone">
<div class="icon">🔍</div>
<p>Arrastra tu archivo de log aqui</p>
<small>Soporta auth.log, nginx access.log, syslog. Maximo 5MB</small>
<br>
<input type="file" id="fileInput" accept=".log,.txt" style="display:none">
<button class="btn" onclick="document.getElementById('fileInput').click()">Seleccionar archivo</button>
</div>
<div class="loading" id="loading">
<div class="spinner"></div>
<p>Analizando logs con IA...</p>
</div>
<div id="results">
<div class="log-type-badge" id="logTypeBadge"></div>
<div class="stats-grid">
<div class="stat-card">
<div class="label">Lineas analizad
